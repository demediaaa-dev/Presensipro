<div class="flex min-h-screen bg-gray-50">
    <aside id="admin-sidebar" class="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 transition-all duration-300 z-50">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3 sidebar-logo">
                <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <span class="font-black text-xl tracking-tighter text-gray-900 logo-text">SIPANDA</span>
            </div>
            <button onclick="Admin.toggleSidebar()" class="p-2 hover:bg-gray-50 rounded-xl text-gray-400">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button onclick="Admin.setTab('stats')" class="admin-nav-item active w-full flex items-center gap-4 p-4 rounded-2xl transition-all">
                <i data-lucide="layout-dashboard"></i>
                <span class="font-bold text-sm nav-label">Dashboard</span>
            </button>
            <button onclick="Admin.setTab('users')" class="admin-nav-item w-full flex items-center gap-4 p-4 rounded-2xl transition-all">
                <i data-lucide="users"></i>
                <span class="font-bold text-sm nav-label">Data Pegawai</span>
            </button>
            <button onclick="Admin.setTab('reports')" class="admin-nav-item w-full flex items-center gap-4 p-4 rounded-2xl transition-all">
                <i data-lucide="file-bar-chart"></i>
                <span class="font-bold text-sm nav-label">Laporan Luar</span>
            </button>
            <button onclick="Admin.setTab('settings')" class="admin-nav-item w-full flex items-center gap-4 p-4 rounded-2xl transition-all">
                <i data-lucide="settings"></i>
                <span class="font-bold text-sm nav-label">Pengaturan</span>
            </button>
        </nav>

        <div class="p-4 border-t border-gray-50">
            <button onclick="App.logout()" class="w-full flex items-center gap-4 p-4 text-red-600 hover:bg-red-50 rounded-2xl transition-all">
                <i data-lucide="log-out"></i>
                <span class="font-bold text-sm nav-label">Keluar</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="hidden md:flex h-20 bg-white border-b border-gray-100 items-center justify-between px-8">
            <h2 id="admin-page-title" class="text-lg font-black uppercase tracking-tight text-gray-800">Ringkasan Sistem</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs font-black text-gray-900 display-name">Admin Name</p>
                    <p class="text-[10px] font-bold text-red-500 uppercase">Super Admin</p>
                </div>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                </div>
            </div>
        </header>

        <div class="md:hidden header-red-section h-[180px] rounded-b-[40px]"></div>
        <header class="md:hidden p-6 flex justify-between items-center text-white relative z-10">
            <div>
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-[0.2em]">Administrator</p>
                <h1 class="text-xl font-black display-name uppercase">Admin</h1>
            </div>
            <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center">
                <i data-lucide="bell" class="w-5 h-5"></i>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 pb-32 md:pb-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm">
                    <div class="w-10 h-10 bg-green-50 text-green-600 rounded-xl flex items-center justify-center mb-3">
                        <i data-lucide="user-check" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Hadir</p>
                    <h3 class="text-2xl font-black text-gray-900">42</h3>
                </div>
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm">
                    <div class="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center mb-3">
                        <i data-lucide="user-x" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Alpa</p>
                    <h3 class="text-2xl font-black text-gray-900">3</h3>
                </div>
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-3">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Luar Area</p>
                    <h3 class="text-2xl font-black text-gray-900">5</h3>
                </div>
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mb-3">
                        <i data-lucide="clock" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Terlambat</p>
                    <h3 class="text-2xl font-black text-gray-900">12</h3>
                </div>
            </div>

			<section id="section-register" class="mb-8">
			    <div class="bg-white p-6 rounded-[35px] border border-gray-100 shadow-sm">
			        <div class="flex items-center gap-3 mb-4">
			            <div class="w-8 h-8 bg-red-50 text-red-600 rounded-lg flex items-center justify-center">
			                <i data-lucide="scan-face" class="w-4 h-4"></i>
			            </div>
			            <h3 class="font-black text-gray-900 uppercase tracking-tight text-sm">Registrasi Wajah Baru</h3>
			        </div>
			        
			        <div class="flex flex-col md:flex-row gap-4">
			            <input id="reg-user-id" type="text" placeholder="Masukkan ID Pegawai (Contoh: P001)" 
			                   class="flex-1 p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-red-500 font-bold text-sm">
			            
			            <button onclick="Admin.startRegistration()" 
			                    class="bg-gray-900 text-white font-black px-8 py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all text-xs uppercase tracking-widest">
			                <i data-lucide="camera" class="w-4 h-4"></i>
			                Pindai Wajah
			            </button>
			        </div>
			    </div>
			</section>

            <div class="bg-white rounded-[35px] border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                    <h3 class="font-black text-gray-900 uppercase tracking-tight">Presensi Terbaru</h3>
                    <button class="text-xs font-bold text-red-600 uppercase">Lihat Semua</button>
                </div>
                <div id="admin-recent-list" class="divide-y divide-gray-50">
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gray-100 rounded-full overflow-hidden flex items-center justify-center text-gray-400">
                                <i data-lucide="user"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-900">Ahmad Dhani</p>
                                <p class="text-[10px] text-gray-400 font-bold uppercase">07:55 WIB • Masuk</p>
                            </div>
                        </div>
                        <span class="px-3 py-1 bg-green-50 text-green-600 text-[9px] font-black rounded-full uppercase">On Time</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 flex items-center justify-around px-6 z-50 rounded-t-[35px] shadow-2xl">
        <button onclick="Admin.setTab('stats')" class="flex flex-col items-center text-red-600">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Dashboard</span>
        </button>
        <button onclick="Admin.setTab('users')" class="flex flex-col items-center text-gray-300">
            <i data-lucide="users" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Pegawai</span>
        </button>
        <button onclick="Admin.setTab('reports')" class="flex flex-col items-center text-gray-300">
            <i data-lucide="file-text" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Laporan</span>
        </button>
        <button onclick="App.logout()" class="flex flex-col items-center text-gray-300">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Logout</span>
        </button>
    </nav>
</div>
