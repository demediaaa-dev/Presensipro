<style>
    :root { --red-panda: #cc2b2b; --red-soft: #fdf2f2; --bg-light: #f9fafb; }
    
    .admin-wrapper { display: flex; height: 100vh; background: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 280px; background: white; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; transition: 0.4s ease; z-index: 50; }
    .sidebar.collapsed { width: 0; transform: translateX(-280px); }
    
    .nav-item { 
        display: flex; align-items: center; gap: 14px; padding: 14px 20px; 
        border-radius: 16px; color: #888; font-weight: 700; text-decoration: none; 
        margin: 4px 15px; transition: 0.2s; font-size: 13px; cursor: pointer;
    }
    .nav-item:hover, .nav-item.active { background: var(--red-soft); color: var(--red-panda); }
    .nav-item.active { box-shadow: inset 4px 0 0 var(--red-panda); }

    /* Main Area */
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    
    /* Pagination & Skeleton */
    .pagination-container { padding: 15px 20px; border-top: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; background: white; }
    .page-btn { padding: 8px 14px; border-radius: 10px; border: 1px solid #eee; background: white; font-size: 11px; font-weight: 800; cursor: pointer; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .skeleton-line { height: 12px; background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 6px; }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Mobile Nav */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px 5px; border-top: 1px solid #eee; justify-content: space-around; z-index: 100; }
    .mobile-item { color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; text-decoration: none; }
    .mobile-item.active { color: var(--red-panda); }

    @media (max-width: 768px) {
        .sidebar { display: none; }
        .bottom-nav { display: flex; }
    }
</style>

<div class="admin-wrapper">
    <aside class="sidebar" id="admin-sidebar">
        <div class="sidebar-header" style="padding: 25px 20px;">
            <div style="background: var(--red-soft); padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 10px;">
                <div style="background: var(--red-panda); color: white; width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="shield-check" style="width: 18px;"></i>
                </div>
                <div>
                    <div style="font-weight: 900; font-size: 12px; color: #333;">SIPANDA</div>
                    <div style="font-size: 8px; color: var(--red-panda); font-weight: 800; letter-spacing: 1px;">ADMIN PANEL</div>
                </div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div onclick="Admin.switchTab('users')" class="nav-item active" data-tab="users"><i data-lucide="users"></i> <span>Pegawai</span></div>
            <div onclick="Admin.switchTab('shifts')" class="nav-item" data-tab="shifts"><i data-lucide="map-pin"></i> <span>Shift</span></div>
            <div onclick="Admin.switchTab('attendance')" class="nav-item" data-tab="attendance"><i data-lucide="calendar-check"></i> <span>Presensi</span></div>
            <div onclick="Admin.switchTab('outstation')" class="nav-item" data-tab="outstation"><i data-lucide="map"></i> <span>Dinas Luar</span></div>
        </nav>

        <div style="margin-top: auto; padding: 20px; border-top: 1px solid #f9f9f9;">
            <button onclick="App.openLogoutModal()" style="width: 100%; padding: 14px; border: none; background: #fff5f5; color: #cc2b2b; border-radius: 14px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i data-lucide="log-out" style="width: 18px;"></i>
                <span>Keluar Sistem</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header style="padding: 15px 30px; display:flex; justify-content:space-between; align-items:center; background:white; border-bottom:1px solid #f0f0f0;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="Admin.toggleSidebar()" style="background: #f9fafb; border: 1px solid #eee; padding: 8px; border-radius: 10px; cursor: pointer; color: #666;">
                    <i data-lucide="menu"></i>
                </button>
                <h1 id="admin-page-title" style="margin: 0; font-size: 18px; font-weight: 900; color: #1a1a1a;">Data Pegawai</h1>
            </div>
            
            <button onclick="App.switchPage('profile-edit')" style="display: flex; align-items: center; gap: 12px; background: none; border: none; cursor: pointer; padding: 5px; border-radius: 12px; transition: 0.2s;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='none'">
                <div style="text-align: right; line-height: 1.2;">
                    <div class="user-name" style="font-size: 12px; font-weight: 900; color: #333;">Admin SiPanda</div>
                    <div style="font-size: 10px; color: var(--red-panda); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Edit Profil <i data-lucide="chevron-right" style="width: 10px; display: inline-block; vertical-align: middle;"></i></div>
                </div>
                <div style="width: 38px; height: 38px; background: linear-gradient(135deg, var(--red-panda), #ff4d4d); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; box-shadow: 0 4px 10px rgba(204,43,43,0.2);">A</div>
            </button>
        </header>

        <section class="content-scroll" style="flex:1; overflow-y:auto; padding: 25px;">
            <div style="background:white; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.02); border:1px solid #f0f0f0; overflow:hidden; display: flex; flex-direction: column;">
                <div style="padding: 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f5f5f5;">
                    <input type="text" onkeyup="Admin.search(this.value)" placeholder="Cari..." style="padding: 10px 15px; border-radius: 12px; border: 1px solid #eee; background: #f9fafb; width: 200px; outline: none; font-size: 12px; font-weight: 600;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="Admin.refreshData()" style="background: #f0f0f0; border: none; padding: 10px; border-radius: 12px; cursor: pointer;"><i data-lucide="refresh-cw" style="width:16px;"></i></button>
                        <button onclick="Admin.openCreateModal()" style="background: var(--red-panda); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer;">+ DATA BARU</button>
                    </div>
                </div>
                <div style="overflow-x:auto; flex: 1;">
                    <table style="width:100%; border-collapse:collapse; font-size: 12px;">
                        <thead id="admin-table-head" style="background:#fafafa; border-bottom:1px solid #f0f0f0;"></thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
                <div class="pagination-container">
                    <div class="page-info" id="admin-page-info">Halaman 1</div>
                    <div style="display:flex; gap:8px;">
                        <button id="admin-prev-btn" onclick="Admin.prevPage()" class="page-btn"><i data-lucide="chevron-left" style="width:14px;"></i></button>
                        <button id="admin-next-btn" onclick="Admin.nextPage()" class="page-btn"><i data-lucide="chevron-right" style="width:14px;"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" onclick="Admin.switchTab('users')" class="mobile-item active" data-tab="users"><i data-lucide="users"></i><span>Pegawai</span></a>
        <a href="javascript:void(0)" onclick="Admin.switchTab('shifts')" class="mobile-item" data-tab="shifts"><i data-lucide="map-pin"></i><span>Shift</span></a>
        <a href="javascript:void(0)" onclick="Admin.switchTab('attendance')" class="mobile-item" data-tab="attendance"><i data-lucide="calendar-check"></i><span>Presensi</span></a>
        <a href="javascript:void(0)" onclick="Admin.switchTab('outstation')" class="mobile-item" data-tab="outstation"><i data-lucide="map"></i><span>Dinas</span></a>
        <a href="javascript:void(0)" onclick="App.openLogoutModal()" class="mobile-item"><i data-lucide="log-out"></i><span>Keluar</span></a>
    </nav>
</div>
