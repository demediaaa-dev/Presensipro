<div class="fixed inset-0 bg-white z-[500] flex flex-col items-center p-8 overflow-y-auto">
    <div class="mt-10 mb-8 text-center">
        <div class="w-24 h-24 bg-red-600 rounded-[30px] shadow-2xl shadow-red-200 mx-auto flex items-center justify-center mb-6">
            <i data-lucide="download-cloud" class="w-12 h-12 text-white"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-900 uppercase tracking-tighter">Install SiPanda</h1>
        <p class="text-gray-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-2">Versi Aplikasi Mobile</p>
    </div>

    <div class="bg-gray-50 p-6 rounded-[35px] w-full max-w-xs mb-8 border border-gray-100">
        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2 text-sm">
            <i data-lucide="check-circle-2" class="w-4 h-4 text-green-500"></i>
            Keunggulan PWA:
        </h3>
        <ul class="space-y-3 text-xs text-gray-500 font-medium">
            <li class="flex gap-3"><span>•</span> Akses cepat dari Home Screen</li>

            <li class="flex gap-3"><span>•</span> Tampilan full screen (tanpa bar browser)</li>
        </ul>

    <button onclick="App.installApp()" 
            class="w-full max-w-xs bg-red-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-red-200 active:scale-95 transition-all flex items-center justify-center gap-3 mb-4">
        Install Sekarang
    </button>

    <button onclick="window.location.hash = '#dashboard'" 
            class="w-full max-w-xs bg-gray-100 text-gray-500 p-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">

    <div class="mt-auto pt-10 text-center">
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Powered by Google Cloud Integration</p>
    </div>
