<div class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full bg-white p-10 rounded-[40px] shadow-2xl shadow-red-900/10 border border-gray-50 text-center">
        <div class="w-20 h-20 bg-red-600 rounded-[30px] mx-auto mb-6 flex items-center justify-center shadow-lg shadow-red-200 rotate-12 transition-transform hover:rotate-0 duration-500">
            <i data-lucide="shield-check" class="w-10 h-10 text-white -rotate-12"></i>
        </div>
        
        <h2 class="text-4xl font-black text-gray-800 mb-1 tracking-tighter">KEHADIRAN<span class="text-red-600">.</span></h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.4em] mb-10 opacity-80">Security & Presence System</p>

        <div class="space-y-4 text-left">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-5 mb-2 block tracking-widest">ID Pegawai</label>
                <input type="text" id="username" 
                    onkeypress="if(event.key === 'Enter') App.handleLogin()"
                    class="w-full bg-gray-50 border-2 border-transparent p-5 rounded-[22px] text-sm font-bold focus:border-red-600/20 focus:bg-white transition-all outline-none" 
                    placeholder="Masukkan ID Anda...">
            </div>

            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-5 mb-2 block tracking-widest">Kata Sandi</label>
                <div class="relative">
                    <input type="password" id="password" 
                        onkeypress="if(event.key === 'Enter') App.handleLogin()"
                        class="w-full bg-gray-50 border-2 border-transparent p-5 rounded-[22px] text-sm font-bold focus:border-red-600/20 focus:bg-white transition-all outline-none" 
                        placeholder="••••••••">
                    <button onclick="App.togglePassword()" class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-300 hover:text-red-600 transition-colors">
                        <i id="eye-icon" data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <button id="btn-login" onclick="App.handleLogin()" class="w-full bg-red-600 text-white p-5 rounded-[22px] font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-red-100 active:scale-95 transition-all mt-6 flex items-center justify-center gap-3">
                <span id="btn-text">Masuk Sekarang</span>
                <div id="btn-loader" class="hidden">
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
            </button>
        </div>
    </div>
</div>
