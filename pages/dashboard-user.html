<div class="header-red-section"></div>

<div class="max-w-md mx-auto min-h-screen flex flex-col p-5 pb-32">
    
    <header class="flex justify-between items-center mb-8 mt-2 text-white px-1">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full border-2 border-white/30 overflow-hidden shadow-lg bg-white/20 flex items-center justify-center font-black text-xl">
                <i data-lucide="user" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-tight display-name">Memuat...</h1>
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest display-role">Pegawai</p>
            </div>
        </div>
        <button onclick="App.checkLocationAccess()" class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center border border-white/10 shadow-sm active:scale-90 transition-all">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
    </header>

    <div class="text-center mb-8">
        <h2 class="text-5xl font-black text-white tracking-tighter">SIPANDA</h2>
        <p id="clock" class="text-xs font-mono text-red-100 tracking-[0.3em] mt-2 font-bold opacity-80">00:00:00 WIB</p>
    </div>

    <div class="bg-white p-6 mb-6 rounded-[35px] shadow-2xl shadow-red-900/10">
        <div class="flex justify-between items-start mb-6 border-b border-gray-50 pb-4">
            <div class="flex items-center gap-3 text-gray-800">
                <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase leading-none mb-1">Status Lokasi</p>
                    <div class="flex items-center gap-1.5">
                        <span id="radius-dot" class="w-2 h-2 bg-gray-300 rounded-full"></span>
                        <p id="radius-text" class="text-xs font-black uppercase text-gray-700">Mengecek Lokasi...</p>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-black text-gray-800">
                    <script>document.write(new Date().toLocaleDateString('id-ID', {weekday:'long', day:'2-digit', month:'short'}))</script>
                </p>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">SINKRON AKTIF</p>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="text-center p-3 bg-gray-50 rounded-2xl border border-gray-100">
                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Metode</p>
                <p class="text-sm font-black text-gray-700 uppercase">Face ID</p>
            </div>
            <div class="text-center p-3 bg-gray-50 rounded-2xl border border-gray-100">
                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Device</p>
                <p class="text-sm font-black text-gray-700 uppercase">Mobile</p>
            </div>
        </div>
    </div>

    <div>
        <p class="text-[11px] font-black text-gray-400 mb-4 ml-1 uppercase tracking-widest opacity-60">Layanan Digital</p>
        <div class="grid grid-cols-4 gap-4 px-1">
            <div class="flex flex-col items-center gap-2">
                <button onclick="App.showToast('Fitur segera hadir', 'info')" class="w-full aspect-square bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-red-500 shadow-sm active:scale-90 transition-all">
                    <i data-lucide="briefcase"></i>
                </button>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-tight text-center leading-tight">Dinas</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="w-full aspect-square bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-red-500 shadow-sm active:scale-90 transition-all">
                    <i data-lucide="file-text"></i>
                </button>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-tight text-center leading-tight">Izin</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="w-full aspect-square bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-red-500 shadow-sm active:scale-90 transition-all">
                    <i data-lucide="edit-3"></i>
                </button>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-tight text-center leading-tight">Jurnal</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="App.currentPage='history'; App.render()" class="w-full aspect-square bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-red-500 shadow-sm active:scale-90 transition-all">
                    <i data-lucide="history"></i>
                </button>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-tight text-center leading-tight">Histori</span>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 bg-white flex items-center justify-around rounded-t-[35px] px-8 z-50 border-t border-gray-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center text-red-600 transition active:scale-90">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-widest">Beranda</span>
        </button>
        
        <div class="relative -top-8">
            <button id="btn-main-presence" onclick="App.startPresence()" 
                class="w-16 h-16 rounded-full flex items-center justify-center border-4 border-white shadow-xl transition active:scale-90 bg-gray-300">
                <i data-lucide="camera" class="w-8 h-8 text-white"></i>
            </button>
            <span id="label-main-presence" class="absolute -bottom-6 left-0 right-0 text-center text-[9px] font-bold text-gray-400 uppercase tracking-tighter">
                Terkunci
            </span>
        </div>

        <button onclick="App.logout()" class="flex flex-col items-center text-gray-300 transition active:scale-90">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-widest">Keluar</span>
        </button>
    </nav>
</div>
