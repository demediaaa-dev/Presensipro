<div class="max-w-md mx-auto min-h-screen flex flex-col p-5 pb-32">
    <header class="flex justify-between items-center mb-8 mt-2 text-white px-1">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full border-2 border-white/30 overflow-hidden shadow-lg bg-white/20 flex items-center justify-center">
                <i data-lucide="user" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-tight display-name">...</h1>
                <p class="text-[10px] font-medium opacity-80 uppercase tracking-widest display-role">Pegawai Tetap</p>
            </div>
        </div>
        <button onclick="App.syncData().then(()=>App.updateDashboardUI())" class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center border border-white/10 active:scale-90 transition-all">
            <i data-lucide="refresh-cw" class="w-4 h-4 text-white"></i>
        </button>
    </header>

    <div class="text-center mb-8">
        <h2 class="text-5xl font-black text-white tracking-tighter">SIPANDA</h2>
        <p id="clock" class="text-xs font-mono text-red-100 tracking-[0.3em] mt-2 font-medium opacity-90">00:00:00 WIB</p>
    </div>

    <div class="bg-white p-6 mb-6 rounded-[35px] shadow-xl shadow-red-900/5">
        <div class="flex justify-between items-start mb-6 border-b border-gray-50 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <div>
                    <p class="text-[10px] font-semibold text-gray-400 uppercase leading-none mb-1">Status Lokasi</p>
                    <div class="flex items-center gap-1.5">
                        <span id="radius-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <p id="radius-text" class="text-xs font-bold uppercase text-gray-700">Dalam Radius</p>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-gray-800">
                    <script>document.write(new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}))</script>
                </p>
                <p class="text-[9px] text-gray-400 font-medium uppercase tracking-widest">Sistem Aktif</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="flex items-center gap-3 p-3 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-indigo-400 uppercase leading-none mb-1">Masuk</p>
                    <p id="time-in" class="text-xs font-black text-indigo-700 uppercase">-- : --</p>
                </div>
            </div>
            <div class="flex items-center gap-3 p-3 bg-red-50/50 rounded-2xl border border-red-100/50">
                <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-red-400 uppercase leading-none mb-1">Pulang</p>
                    <p id="time-out" class="text-xs font-black text-red-700 uppercase">-- : --</p>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2">
            <button class="flex flex-col items-center gap-2 p-2 hover:bg-gray-50 rounded-2xl transition-all group">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center transition-colors group-hover:bg-blue-100">
                    <i data-lucide="calendar-days" class="w-5 h-5"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Izin</span>
            </button>
            <button class="flex flex-col items-center gap-2 p-2 hover:bg-gray-50 rounded-2xl transition-all group" onclick="window.location.hash='#history'">
                <div class="w-10 h-10 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center transition-colors group-hover:bg-purple-100">
                    <i data-lucide="history" class="w-5 h-5"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Riwayat</span>
            </button>
            <button class="flex flex-col items-center gap-2 p-2 hover:bg-gray-50 rounded-2xl transition-all group">
                <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center transition-colors group-hover:bg-orange-100">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Jadwal</span>
            </button>
            <button class="flex flex-col items-center gap-2 p-2 hover:bg-gray-50 rounded-2xl transition-all group">
                <div class="w-10 h-10 bg-green-50 text-green-500 rounded-xl flex items-center justify-center transition-colors group-hover:bg-green-100">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-500 uppercase">Gaji</span>
            </button>
        </div>
    </div>

    <div id="face-reg-card" class="hidden mb-6">
        <div class="bg-amber-50 border border-amber-100 p-6 rounded-[30px] shadow-sm">
            <div class="flex items-start gap-4 mb-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-amber-600 shadow-sm shrink-0">
                    <i data-lucide="scan-face" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-amber-800 uppercase tracking-tight mb-1">Aktivasi Biometrik</p>
                    <p class="text-[11px] font-medium text-amber-700/80 leading-relaxed">Wajah Anda belum terdaftar. Silakan lakukan pendaftaran mandiri untuk dapat menggunakan fitur presensi kehadiran.</p>
                </div>
            </div>
            <button onclick="App.startSelfRegistration()" class="w-full bg-amber-600 text-white p-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.15em] flex items-center justify-center gap-2 shadow-lg shadow-amber-200 active:scale-95 transition-all">
                Mulai Pendaftaran Wajah
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 bg-white flex items-center justify-around rounded-t-[35px] px-8 z-50 border-t border-gray-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="window.location.hash='#dashboard'" class="flex flex-col items-center text-red-600 transition active:scale-90">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-widest">Beranda</span>
        </button>
        <div class="relative -top-8 text-center">
            <button id="btn-main-presence" onclick="App.startPresence()" class="w-16 h-16 rounded-full flex items-center justify-center border-4 border-white shadow-xl bg-gray-300 transition-all">
                <i data-lucide="camera" class="w-8 h-8 text-white"></i>
            </button>
            <span id="label-main-presence" class="block mt-2 text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Memuat...</span>
        </div>
        <button onclick="App.openLogoutModal()" class="flex flex-col items-center text-gray-300 transition active:scale-90">
            <i data-lucide="log-out" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-widest">Keluar</span>
        </button>
    </nav>
</div>
