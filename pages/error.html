<div class="fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-8">
    <div class="relative mb-8">
        <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center animate-pulse">
            <i data-lucide="shield-off" class="w-12 h-12 text-red-600"></i>
        </div>
        <div class="absolute -top-2 -right-2 w-8 h-8 bg-red-600 rounded-full border-4 border-white flex items-center justify-center">
            <i data-lucide="x" class="w-4 h-4 text-white"></i>
        </div>
    </div>

    <h1 class="text-3xl font-black text-gray-900 uppercase tracking-tighter mb-2">Akses Terbatas</h1>
    <div class="w-12 h-1.5 bg-red-600 rounded-full mb-6"></div>
    
    <p class="text-gray-500 text-center max-w-xs leading-relaxed font-medium mb-10">
        Maaf, akun Anda tidak memiliki izin untuk melihat halaman ini. Silakan kembali ke area yang diizinkan.
    </p>

    <button onclick="handleErrorRedirect()" 
            class="w-full max-w-xs bg-gray-900 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-gray-200 active:scale-95 transition-all flex items-center justify-center gap-3">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Kembali ke Beranda
    </button>
</div>

<script>
    // Fungsi khusus untuk mengarahkan user sesuai rolenya
    function handleErrorRedirect() {
        const session = JSON.parse(localStorage.getItem('sipanda_session'));
        if (!session) {
            window.location.hash = '#login';
        } else {
            window.location.hash = (session.Role.toLowerCase() === 'admin') ? '#admin' : '#dashboard';
        }
    }
    // Refresh icon karena ini dimuat dinamis
    lucide.createIcons();
</script>
