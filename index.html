<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kehadiran - Sistem Presensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .header-red-section {
            position: fixed; top: 0; left: 0; right: 0; height: 35vh;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; z-index: -1;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="header-red-section"></div>

    <main id="app-content"></main>

    <div id="modal-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] transition-all duration-500 shadow-2xl" style="visibility: hidden; opacity: 0;">
        <div id="presence-sheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[45px] transition-transform duration-500 translate-y-full will-change-transform shadow-[-0_-20px_60px_rgba(0,0,0,0.1)] touch-none">
            
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto my-5 cursor-grab active:cursor-grabbing drag-handle"></div>
            
            <div class="p-8 pt-0 text-center">
                <h3 id="camera-title" class="font-black text-gray-800 text-xl uppercase tracking-tight mb-6">Pindai Wajah</h3>
                
                <div class="relative overflow-hidden rounded-full mx-auto bg-gray-900 border-8 border-white shadow-[-0_-20px_60px_rgba(255,0,0,0.15)] flex items-center justify-center aspect-square shadow-inner transition-all duration-300" style="width: calc(100% - 30px);">
                    
                    <video id="video" autoplay muted playsinline class="absolute inset-0 w-full h-full object-cover scale-x-[-1]"></video>
                    
                    <canvas id="freeze-canvas" class="absolute inset-0 w-full h-full object-cover scale-x-[-1] z-10 hidden"></canvas>
                    
                    <canvas id="overlay-canvas" class="absolute inset-0 w-full h-full object-cover scale-x-[-1] z-20"></canvas>
                    
                    <div id="camera-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-white/50 z-30">
                        <svg id="spinner" class="animate-spin h-8 w-8 text-white hidden" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <span id="camera-status-text" class="text-[10px] font-bold uppercase tracking-widest text-white hidden">Menganalisis</span>
                        <div id="loading-overlay" class="absolute inset-0 z-40 flex flex-col items-center justify-center bg-black/40 backdrop-blur-[2px] hidden transition-all duration-300">
                            <div class="relative flex items-center justify-center">
                                <div class="w-16 h-16 border-4 border-red-200 border-t-red-600 rounded-full animate-spin"></div>
                                <div class="absolute w-10 h-10 border-4 border-white/20 border-b-white/60 rounded-full animate-spin-slow"></div>
                            </div>
                            <p class="mt-4 text-white text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Processing AI</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="App.closePresence()" class="flex-1 bg-gray-100 text-gray-500 p-5 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95 transition-all">Batal</button>
                    
                    <button id="btn-camera-action" class="flex-[2] bg-red-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-red-200 active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-50">
                        <span id="btn-text-camera">Ambil Wajah</span>
                        <div id="btn-loader-camera" class="hidden">
                            <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="logout-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] transition-all duration-300 shadow-2xl" style="visibility: hidden; opacity: 0;">
        <div id="logout-sheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[40px] p-8 transition-transform duration-500 translate-y-full touch-none">
            <div class="drag-handle w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-grab active:cursor-grabbing"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <i data-lucide="log-out" class="w-8 h-8"></i>
                </div>
                <h3 class="font-black text-gray-800 text-xl uppercase tracking-tight">Keluar Sesi?</h3>
                <p class="text-gray-400 text-xs font-bold mt-2 uppercase tracking-widest">Anda harus login kembali nanti</p>
            </div>

            <div class="flex gap-3">
                <button onclick="App.closeLogoutModal()" class="flex-1 bg-gray-100 text-gray-500 p-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Batal</button>
                <button onclick="App.confirmLogout()" class="flex-[2] bg-red-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-red-200 active:scale-95 transition-all">Ya, Keluar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[200] space-y-3 w-80 pointer-events-none"></div>
    
    <script src="js/api.js"></script>
    <script src="js/face-logic.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
