<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiPanda - Sistem Presensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .header-red-section {
            position: fixed; top: 0; left: 0; right: 0; height: 35vh;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; z-index: -1;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="header-red-section"></div>

    <main id="app-content"></main>

    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] transition-all duration-300" style="visibility: hidden; opacity: 0;">
        <div id="presence-sheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[40px] p-8 transition-transform duration-500 translate-y-full">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            
            <h3 id="camera-title" class="text-center font-black text-gray-800 text-xl mb-2 uppercase tracking-tight">Verifikasi Wajah</h3>
            <p class="text-center text-gray-400 text-[10px] font-bold mb-8 uppercase tracking-[0.2em]">Pastikan wajah terlihat jelas</p>

            <div class="relative w-full aspect-square bg-black rounded-[35px] overflow-hidden border-4 border-gray-50 shadow-inner mb-8">
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover bg-black"></video>
                <div class="absolute inset-0 border-[30px] border-black/20 pointer-events-none flex items-center justify-center">
                    <div class="w-full h-full border-2 border-white/20 rounded-full border-dashed animate-pulse"></div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="App.closePresence()" class="flex-1 bg-gray-100 text-gray-500 p-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Batal</button>
                <button id="btn-camera-action" class="flex-[2] bg-red-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-red-200 active:scale-95 transition-all">Konfirmasi</button>
            </div>
        </div>
    </div>

    <div id="logout-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] transition-all duration-300 shadow-2xl" style="visibility: hidden; opacity: 0;">
        <div id="logout-sheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[40px] p-8 transition-transform duration-500 translate-y-full touch-none">
            <div class="drag-handle w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-grab active:cursor-grabbing"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <i data-lucide="log-out" class="w-8 h-8"></i>
                </div>
                <h3 class="font-black text-gray-800 text-xl uppercase tracking-tight">Keluar Sesi?</h3>
                <p class="text-gray-400 text-xs font-bold mt-2 uppercase tracking-widest">Anda harus login kembali nanti</p>
            </div>

            <div class="flex gap-3">
                <button onclick="App.closeLogoutModal()" class="flex-1 bg-gray-100 text-gray-500 p-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Batal</button>
                <button onclick="App.confirmLogout()" class="flex-[2] bg-red-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-red-200 active:scale-95 transition-all">Ya, Keluar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[200] space-y-3 w-80 pointer-events-none"></div>
    
    <script src="js/api.js"></script>
    <script src="js/face-logic.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
